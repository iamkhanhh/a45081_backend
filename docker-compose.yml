version: '3.1'
services:
    mongodb:
        image: mongo:4.2.14
        container_name: genetics-mongodb
        volumes:
            - ./db/mongodb:/data/db
            - /Users/kien/Documents/KLTN/genetic-s3:/genetic-s3
        ports:
            - "28000:27017"
        healthcheck:
          test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
          interval: 10s
          timeout: 5s
          retries: 5
          start_period: 10s
        restart: unless-stopped

    database:
        command: "--default-authentication-plugin=mysql_native_password --character-set-server=utf8 --collation-server=utf8_unicode_ci"
        image: mysql:8.0.33
        container_name: genetics-mysql
        environment:
            - "MYSQL_ROOT_PASSWORD=khanh123"
            - "MYSQL_DATABASE=genetics"
        volumes:
            - ./db/mysql:/var/lib/mysql
        ports:
            - "33069:3306"
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pkhanh123"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        restart: unless-stopped

    redis:
      image: redis:8-alpine
      container_name: genetics-redis
      ports:
        - "6380:6379"
      volumes:
        - ./db/redis:/data
      healthcheck:
        test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
        interval: 10s
        timeout: 3s
        retries: 5
      restart: unless-stopped

    backend:
        build: ./backend
        container_name: genetics-backend
        ports:
            - "3000:3000"
        depends_on:
            database:
                condition: service_healthy
            mongodb:
                condition: service_healthy
            redis:
                condition: service_healthy
        environment:
            DB_HOST: database
            DB_PORT: 3306
            DB_USERNAME: root
            DB_PASSWORD: 123456
            DB_DATABASE: genetics
            MONGO_DB_HOST: mongodb
            MONGO_DB_PORT: 27017
            MONGO_DB_DATABASE: genetics
        healthcheck:
            test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        restart: unless-stopped
        volumes:
            - ./backend:/app
            - /app/node_modules
            - /Users/kien/Documents/KLTN/genetic-s3:/genetic-s3